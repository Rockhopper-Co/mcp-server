name: Coverage

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

jobs:
  coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Validate coverage thresholds are configured
        run: |
          node -e "const fs=require('fs');const s=fs.readFileSync('vitest.config.ts','utf8');const mins={statements:95,branches:70,functions:90,lines:95};for(const [k,min] of Object.entries(mins)){const m=s.match(new RegExp(k+'\\\\s*:\\\\s*(\\\\d+)'));if(!m||Number(m[1])<min){throw new Error('coverage threshold for '+k+' is below '+min)}}"
      - name: Run full test suite with coverage (unit + in-process e2e + stdio e2e subprocess)
        run: npm run test:cov

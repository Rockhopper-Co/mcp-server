name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm

      # Trusted Publishing (OIDC) requires npm CLI >= 11.5.1.
      # Node 20 ships with npm 10.x, so upgrade explicitly.
      - name: Upgrade npm CLI for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # TODO(mcp): wire eslint in a follow-up PR; skipping for GA.
      # - name: Lint
      #   run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bin is executable
        run: |
          test -f dist/index.js
          head -n1 dist/index.js | grep -q '^#!/usr/bin/env node'
          chmod +x dist/index.js

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run --access public

      # Trusted Publishing: no NPM_TOKEN. npm CLI exchanges the GitHub OIDC
      # token for a short-lived registry credential automatically, and
      # provenance is implied (cannot be disabled). See:
      # https://docs.npmjs.com/trusted-publishers
      - name: Publish to npm (Trusted Publishing + provenance)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: npm publish --access public

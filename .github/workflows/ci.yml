name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      # TODO(mcp): wire eslint (scope creep deferred from GA push); see issue tracker.
      # - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Dry-run npm publish (no auth required)
        run: npm publish --dry-run --access public

  auto-tag:
    name: Tag release if version bumped
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new version and create tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PKG_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
          else
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Dispatching publish workflow"
            gh workflow run publish.yml
          fi

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      # TODO(mcp): wire eslint (scope creep deferred from GA push); see issue tracker.
      # - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Dry-run npm publish (no auth required)
        run: npm publish --dry-run --access public
